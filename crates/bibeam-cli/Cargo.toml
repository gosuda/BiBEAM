[package]
name         = "bibeam-cli"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
description  = "BiBEAM end-user client daemon + CLI."

[[bin]]
name = "bibeam"
