[net]
git-fetch-with-cli = true
retry = 3

# Linker selection (e.g. `-C link-arg=-fuse-ld=lld`) lives at the developer
# layer, not in this repo-tracked config: hardcoding `lld` here would break
# `cargo build` on Linux hosts that lack the linker. The canonical opt-in
# paths are documented in `docs/operator-runbook.md` and (for CI) in
# `.github/workflows/ci.yml`.
