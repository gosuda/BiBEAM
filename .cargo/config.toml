[build]
# uncomment for sccache if installed:
# rustc-wrapper = "sccache"

[net]
git-fetch-with-cli = true
retry              = 3

[term]
color = "always"

[alias]
ci          = "run --package xtask --release -- ci"
xtask       = "run --package xtask --release --"
lint        = "clippy --workspace --all-targets --all-features -- -D warnings"
check-all   = "check  --workspace --all-targets --all-features"
test-all    = "nextest run --workspace --all-features"
doc-all     = "doc --workspace --no-deps --all-features"
deny-all    = "deny check"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
